name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint-and-test:
    name: ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e ".[dev,notebooks]"

      - name: Lint (ruff)
        run: |
          ruff check src tests dashboard
          ruff format --check src tests dashboard

      - name: Type-check (mypy, best-effort)
        run: mypy src || true

      - name: Tests
        env:
          PYTHONPATH: src
        run: pytest -m "not slow and not integration" --no-cov -q

  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: |
          python -m pip install --upgrade pip pre-commit
          pre-commit run --all-files --show-diff-on-failure

  build-report:
    name: Compile working paper
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e ".[dev,notebooks]"

      # Ensure the artefacts exist before LaTeX consumes them. We run the
      # full pipeline at a small n_sims (CI-time-friendly) so the report's
      # tables and figures are reproducible.
      - name: Materialise artefacts
        env:
          PYTHONPATH: src
        run: |
          python -m tranche_pricing.cli calibrate --config config/paris_intermediate.yaml
          python -m tranche_pricing.cli mc --config config/paris_intermediate.yaml --n-sims 2000
          python -m tranche_pricing.cli figures --config config/paris_intermediate.yaml
          python report/build_tables.py

      - name: Compile LaTeX
        uses: xu-cheng/latex-action@v3
        with:
          root_file: main.tex
          working_directory: report
          latexmk_use_xelatex: false

      - name: Upload PDF
        uses: actions/upload-artifact@v4
        with:
          name: working-paper-pdf
          path: report/main.pdf
          retention-days: 90
